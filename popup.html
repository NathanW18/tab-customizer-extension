<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 250px; font-family: -apple-system, sans-serif; padding: 14px; margin: 0; }
    h3 { margin-top: 0; color: #1a73e8; font-size: 15px; }
    p { font-size: 12px; color: #5f6368; line-height: 1.4; }
    button { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: 500; }
    button:hover { background-color: #1557b0; }
    button:disabled { background-color: #c4c7c5; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 11px; color: #444746; word-wrap: break-word; }
  </style>
</head>
<body>
  <h3>AI Tab Organizer</h3>
  <p>Analyze and group your open tabs by theme using on-device Gemini AI.</p>
  <button id="organize-btn">Organize Tabs with AI</button>
  <div id="status">Ready</div>

  <script src="popup.js"></script>
</body>
</html>
